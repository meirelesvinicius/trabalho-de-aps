<script>
// ==================== SEU CÓDIGO JS ORIGINAL ====================
/* Seus produtos, carrinho, funções etc... (mantidos) */

// ==================== CARRINHO 3D ====================
function initCarrinho3D() {
  const container = document.getElementById('carrinho-3d-container');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0a);

  const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(0, 6, 14);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.shadowMap.enabled = true;
  container.appendChild(renderer.domElement);

  // Luzes
  const ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0x7B3FFF, 1);
  dirLight.position.set(10, 20, 10);
  dirLight.castShadow = true;
  scene.add(dirLight);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enableZoom = true;
  controls.maxPolarAngle = Math.PI * 0.5;

  // Cria o carrinho
  function createCart() {
    const cart = new THREE.Group();

    const redMat = new THREE.MeshPhongMaterial({ color: 0xff3b5c, shininess: 40 });
    const darkMat = new THREE.MeshPhongMaterial({ color: 0x222222 });

    // Corpo
    const body = new THREE.Mesh(new THREE.BoxGeometry(5.5, 3.8, 6), redMat);
    body.position.y = 4;
    body.castShadow = true;
    cart.add(body);

    // Rodas
    const wheelGeo = new THREE.CylinderGeometry(0.9, 0.9, 0.7, 32);
    const positions = [[-2.2, 1.2, 2.8], [2.2, 1.2, 2.8], [-2.2, 1.2, -2.8], [2.2, 1.2, -2.8]];

    positions.forEach(pos => {
      const wheel = new THREE.Mesh(wheelGeo, darkMat);
      wheel.rotation.z = Math.PI / 2;
      wheel.position.set(...pos);
      wheel.castShadow = true;
      cart.add(wheel);
    });

    // Alça
    const handle = new THREE.Mesh(new THREE.BoxGeometry(0.5, 6, 0.5), darkMat);
    handle.position.set(0, 7.5, -2.8);
    handle.rotation.x = 0.25;
    cart.add(handle);

    cart.scale.set(0.85, 0.85, 0.85);
    return cart;
  }

  const shoppingCart = createCart();
  scene.add(shoppingCart);

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    shoppingCart.rotation.y += 0.003; // rotação suave
    renderer.render(scene, camera);
  }

  animate();

  // Responsivo
  window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });
}

// Inicializa o 3D quando carregar
window.onload = () => {
  initCarrinho3D();
  renderizarProdutos(); // sua função original
};
</script>
