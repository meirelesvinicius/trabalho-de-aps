<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage Gaúcha Automotiva</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
scroll-behavior:smooth;
}
body{
background:#070707;
color:white;
overflow-x:hidden;
}

/* FUNDO GLOW */
body::before{
content:'';
position:fixed;
width:900px;
height:900px;
background:radial-gradient(circle,#7B3FFF44 0%,transparent 70%);
top:-300px;
right:-300px;
filter:blur(120px);
z-index:-1;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 70px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.03);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:999;
}
.logo{
display:flex;
align-items:center;
gap:12px;
font-size:24px;
font-weight:700;
letter-spacing:2px;
}
.logo-circle{
width:45px;
height:45px;
border-radius:50%;
background:#7B3FFF;
display:flex;
align-items:center;
justify-content:center;
font-weight:800;
font-size:20px;
box-shadow:0 0 30px #7B3FFF99;
}
nav{
display:flex;
align-items:center;
gap:25px;
}
nav a{
text-decoration:none;
color:white;
font-size:14px;
opacity:0.8;
transition:0.3s;
}
nav a:hover{
color:#b58cff;
opacity:1;
}

/* CARRINHO */
.carrinho-btn{
position:relative;
background:none;
border:none;
font-size:26px;
cursor:pointer;
color:white;
}
.carrinho-badge{
position:absolute;
top:-10px;
right:-10px;
background:#ff4757;
width:20px;
height:20px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:700;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:140px 70px 70px;
position:relative;
overflow:hidden;
}
.hero-text{
max-width:650px;
z-index:2;
}
.hero-text h1{
font-size:110px;
line-height:0.9;
font-weight:300;
letter-spacing:-5px;
color:#ffffffdd;
}
.hero-text h1 span{
color:#b58cff;
text-shadow:0 0 40px #7B3FFF88;
}
.hero-text p{
margin-top:35px;
font-size:18px;
line-height:1.8;
color:#b9b9b9;
max-width:520px;
}
.hero-buttons{
display:flex;
gap:20px;
margin-top:40px;
}
.btn{
padding:18px 35px;
border:none;
border-radius:60px;
font-weight:700;
cursor:pointer;
transition:0.4s;
font-size:15px;
text-decoration:none;
display:inline-flex;
align-items:center;
justify-content:center;
}
.btn-primary{
background:#7B3FFF;
color:white;
box-shadow:0 0 30px #7B3FFF88;
}
.btn-primary:hover{
transform:translateY(-5px);
box-shadow:0 0 60px #7B3FFF;
}
.btn-secondary{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
color:white;
}
.hero-car{
position:relative;
width:52%;
display:flex;
justify-content:center;
align-items:center;
}
.hero-car img{
width:100%;
max-width:900px;
filter: drop-shadow(0 0 80px #7B3FFF66) brightness(1.05);
animation:float 6s ease-in-out infinite;
}
@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-18px);}
100%{transform:translateY(0px);}
}

/* CARD FLUTUANTE */
.floating-card{
position:absolute;
left:80px;
bottom:90px;
width:280px;
padding:22px;
border-radius:28px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(30px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 40px rgba(123,63,255,0.15);
animation:float 5s ease-in-out infinite;
}

/* STATS */
.stats{
display:flex;
gap:30px;
margin-top:50px;
flex-wrap: wrap;
}

/* SEÇÕES */
section{
padding:100px 70px;
}
section h2{
font-size:48px;
margin-bottom:20px;
}

/* GRIDS */
.servicos-grid,
.produtos-grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
gap:25px;
margin-top:40px;
}

/* CARDS */
.servico-card,
.produto-card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
padding:30px;
border-radius:24px;
transition:0.4s;
text-align:center;
}
.servico-card:hover,
.produto-card:hover{
transform:translateY(-8px);
box-shadow:0 0 40px rgba(123,63,255,0.18);
}
.produto-img{
height:180px;
display:flex;
justify-content:center;
align-items:center;
font-size:70px;
background:#111;
border-radius:20px;
margin-bottom:20px;
}
.preco{
font-size:28px;
font-weight:700;
margin:15px 0;
color:#c7a8ff;
}

/* CATEGORIAS */
.categorias{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:30px;
}
.categoria-btn{
padding:12px 24px;
border:none;
border-radius:40px;
background:#161616;
color:white;
cursor:pointer;
transition:0.3s;
white-space: nowrap;
}

/* CONTATO */
.contato-info{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-top:40px;
}

/* MODAIS */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}
.modal-content{
background:#121212;
padding:35px;
border-radius:24px;
width:90%;
max-width:550px;
max-height:90vh;
overflow-y:auto;
border:1px solid rgba(255,255,255,0.08);
}

/* RESPONSIVIDADE - MELHORADA */
@media(max-width:1200px){
.hero{
flex-direction:column;
text-align:center;
gap:60px;
padding:160px 40px 80px;
}
.hero-text h1{
font-size:82px;
}
.hero-car{
width:100%;
}
.floating-card{
position:relative;
left:auto;
bottom:auto;
margin: -40px auto 0;
}
}

@media(max-width:768px){
header{
padding:18px 20px;
flex-direction:column;
gap:18px;
}
nav{
gap:15px;
font-size:13px;
}
.hero{
padding:160px 25px 80px;
}
.hero-text h1{
font-size:62px;
letter-spacing:-3px;
}
.hero-text p{
font-size:17px;
}
.hero-buttons{
flex-direction:column;
align-items:center;
}
.btn{
width:100%;
max-width:320px;
}

.stats{
justify-content:center;
gap:20px;
}
.stat-box{
min-width:120px;
padding:18px;
}

section{
padding:70px 25px;
}
section h2{
font-size:38px;
}

.servicos-grid,
.produtos-grid{
grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
gap:20px;
}
}

@media(max-width:480px){
.hero-text h1{
font-size:52px;
}
.hero-car img{
max-width:100%;
}
.floating-card{
width:90%;
}
}
</style>
</head>
<body>

<div class="logo-circle">S</div>
STAGE GAÚCHA
</div>
<nav>
<a href="#home">Home</a>
<a href="#empresa">Empresa</a>
<a href="#servicos">Serviços</a>
<a href="#produtos">Loja</a>
<a href="#contato">Contato</a>
<button class="carrinho-btn" onclick="abrirCarrinho()">
🛒 <span class="carrinho-badge" id="carrinho-badge">0</span>
</button>
</nav>
</header>

</script>

</body>
</html>
